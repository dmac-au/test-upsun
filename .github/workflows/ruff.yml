name: Ruff
on: [push, pull_request]
permissions:
  contents: write
jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ruff check --fix
        uses: astral-sh/ruff-action@v3
        with:
          args: check --fix

      - name: Ruff format
        uses: astral-sh/ruff-action@v3
        with:
          args: format

      - name: Commit & push changes
        run: |
          git config --global user.name 'Ruff'
          git config --global user.email 'dmac-au@users.noreply.github.com'
          if ! git diff --quiet; then
            git add -A
            git commit -m "Formatted files"
            git push
          else
            echo "No changes to commit"
          fi
